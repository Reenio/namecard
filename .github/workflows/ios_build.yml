name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install iOS Pods
        run: |
          cd ios
          pod install

      - name: Patch Xcode project to disable code signing
        run: |
          # Replace any DEVELOPMENT_TEAM assignment with an empty value in the project file
          # This makes Flutter's own project-file check pass (it won't find a missing team)
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj

          # Disable code signing entirely in the project file for all build configurations
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj

          # Also append overrides to the Release xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Release.xcconfig
          echo 'DEVELOPMENT_TEAM=' >> ios/Flutter/Release.xcconfig

      - name: Build iOS Application (No Code Sign)
        run: |
          flutter build ios --release --no-codesign

      - name: Compress App to IPA
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          echo "App path contents:"
          ls -la "$APP_PATH" || (echo "Not found there, listing build/ios:" && find build/ios -name "*.app" -type d)
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r namecard-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecard-ios-app
          path: namecard-unsigned.ipa
