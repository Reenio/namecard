name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install iOS Pods
        run: |
          cd ios
          pod install

      - name: Force Disable Code Signing in config
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=-" >> ios/Flutter/Release.xcconfig

      - name: Build iOS Application (Raw xcodebuild)
        run: |
          # 1. Ask Flutter to build for the Simulator. This forcefully generates all 
          # Flutter Xcode plugins and Config files without ANY Apple signature checks.
          flutter build ios --debug --simulator

          # 2. Use Apple's raw build tool to compile an unsigned physical device binary
          # SYMROOT is set explicitly so we know exactly where the output lands.
          cd ios
          xcodebuild clean build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$(pwd)/../build/ios" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Compress App to IPA
        run: |
          # xcodebuild places the .app inside SYMROOT/Release-iphoneos
          APP_DIR="build/ios/Release-iphoneos"
          echo "Contents of $APP_DIR:"
          ls -la "$APP_DIR" || (echo "Directory not found, listing build/ios:" && ls -laR build/ios)
          
          mkdir -p Payload
          cp -r "$APP_DIR/Runner.app" Payload/
          zip -r namecard-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecard-ios-app
          path: build/namecard-unsigned.ipa
