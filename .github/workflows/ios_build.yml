name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build_ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install iOS Pods
        run: |
          cd ios
          pod install

      - name: Build iOS Application (No Codesign)
        # We build it without code signing so it succeeds without an Apple Developer certificate
        # Note: You still need a paid Apple Developer account to actually install it on an iPhone 
        # unless you sideload it (e.g. using AltStore).
        run: flutter build ios --release --no-codesign

      # Compresses the resulting .app into an IPA-like zip folder
      - name: Compress App
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ./app.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecard-ios-app
          path: build/ios/iphoneos/app.ipa
