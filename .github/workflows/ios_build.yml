name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install iOS Pods
        run: |
          cd ios
          pod install

      - name: Build iOS Application (Unsigned IPA)
        run: |
          # Use flutter's dedicated IPA pipeline but explicitly disable codesigning checks
          flutter build ipa --release --no-codesign

      - name: Extract App and Zip to IPA
        run: |
          # 'flutter build ipa --no-codesign' creates an .xcarchive instead of a final .ipa
          # We need to manually extract the .app from it and zip it into our own .ipa file
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../../../namecard.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecard-ios-app
          path: build/namecard.ipa
